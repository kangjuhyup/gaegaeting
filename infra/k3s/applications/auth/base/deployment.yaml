apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: app
  labels:
    app: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "true"
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: ghcr.io/kangjuhyup/gaegaeting/auth-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 2799
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
          envFrom:
            - secretRef:
                name: auth-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /auth/health
              port: 2799
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /auth/health
              port: 2799
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
