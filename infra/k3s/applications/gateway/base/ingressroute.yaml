apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: gateway
  namespace: app
spec:
  entryPoints:
    - websecure
  routes:
    # 1) If Authorization header exists -> run forwardAuth
    - kind: Rule
      match: Host(`api.gaegaeting.app`) && PathPrefix(`/gateway`) && HeadersRegexp(`Authorization`, `.+`)
      priority: 1000
      middlewares:
        - name: gateway-forwardauth
      services:
        - name: gateway
          port: 4000

    # 2) Otherwise -> pass through without forwardAuth (public)
    - kind: Rule
      match: Host(`api.gaegaeting.app`) && PathPrefix(`/gateway`)
      priority: 900
      services:
        - name: gateway
          port: 4000
  tls:
    secretName: gateway-tls


