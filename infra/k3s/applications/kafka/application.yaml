apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: kafka
    targetRevision: 26.4.3
    helm:
      values: |
        ## Global settings
        global:
          storageClass: "local-path"

        ## Image configuration
        image:
          registry: docker.io
          repository: bitnami/kafka
          tag: "3.7"
          digest: ""
          pullPolicy: IfNotPresent

        ## Combined mode (broker + controller in single pod for dev)
        replicaCount: 1

        ## Persistence
        persistence:
          enabled: true
          storageClass: "local-path"
          size: 10Gi

        ## Resources (minimal for dev)
        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 1Gi
            cpu: 500m

        ## Kafka configuration
        kraft:
          enabled: true

        listeners:
          client:
            protocol: PLAINTEXT
          controller:
            protocol: PLAINTEXT
          interbroker:
            protocol: PLAINTEXT

        ## Kafka server properties (single replica settings)
        extraConfig: |
          auto.create.topics.enable=true
          default.replication.factor=1
          min.insync.replicas=1
          num.partitions=3
          offsets.topic.replication.factor=1
          transaction.state.log.replication.factor=1
          transaction.state.log.min.isr=1
          log.retention.hours=168
          compression.type=producer
          message.max.bytes=10485760

        ## Metrics (disabled)
        metrics:
          kafka:
            enabled: false
          jmx:
            enabled: false

        ## Disable JMX exporter sidecar
        externalAccess:
          enabled: false

        ## Controller settings
        controller:
          jmx:
            enabled: false

        ## Zookeeper (disabled in KRaft mode)
        zookeeper:
          enabled: false

        ## Service configuration
        service:
          type: ClusterIP
          ports:
            client: 9092

        ## Headless service
        headlessService:
          ports:
            client: 9092
  destination:
    server: https://kubernetes.default.svc
    namespace: messaging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
