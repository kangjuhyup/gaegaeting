apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: messaging
  labels:
    app: kafka
spec:
  type: ClusterIP
  ports:
    - name: client
      port: 9092
      targetPort: client
      protocol: TCP
  selector:
    app: kafka
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: messaging
  labels:
    app: kafka
spec:
  clusterIP: None
  ports:
    - name: client
      port: 9092
      targetPort: client
      protocol: TCP
  selector:
    app: kafka
