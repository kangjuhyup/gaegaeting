apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: account
  namespace: app
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # Attach Traefik ForwardAuth middleware (namespace-name@kubernetescrd)
    # This will call auth service and, if present, propagate `x-jwt-payload` to the account upstream request.
    traefik.ingress.kubernetes.io/router.middlewares: app-account-forwardauth@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - api.gaegaeting.app
      secretName: account-tls
  rules:
    - host: api.gaegaeting.app
      http:
        paths:
          - path: /account
            pathType: Prefix
            backend:
              service:
                name: account
                port:
                  number: 2800
