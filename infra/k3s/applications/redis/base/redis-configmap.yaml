apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: database
data:
  redis.conf: |
    # Redis performance tuning
    maxmemory 256mb
    maxmemory-policy allkeys-lru

    # Persistence
    save 900 1
    save 300 10
    save 60 10000

    # AOF persistence
    appendonly yes
    appendfsync everysec

    # Networking
    tcp-backlog 511
    timeout 0
    tcp-keepalive 300

    # Limits
    maxclients 10000

    # Disable dangerous commands
    rename-command FLUSHDB ""
    rename-command FLUSHALL ""
