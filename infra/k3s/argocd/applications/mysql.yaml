apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mysql
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: mysql
    targetRevision: 9.14.4
    helm:
      values: |
        ## MySQL Configuration
        global:
          storageClass: "local-path"

        architecture: replication

        image:
          registry: docker.io
          repository: mysql
          tag: "8.4"
          pullPolicy: IfNotPresent

        auth:
          rootPassword: ""
          database: gaegaeting
          username: gaegaeting
          password: ""
          replicationUser: replicator
          replicationPassword: ""

        primary:
          name: master
          persistence:
            enabled: true
            storageClass: "local-path"
            size: 20Gi
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 2Gi
              cpu: 2000m

        secondary:
          name: replica
          replicaCount: 1
          persistence:
            enabled: true
            storageClass: "local-path"
            size: 20Gi
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 2Gi
              cpu: 2000m

        metrics:
          enabled: false

        service:
          type: ClusterIP
          ports:
            mysql: 3306
  destination:
    server: https://kubernetes.default.svc
    namespace: database
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
