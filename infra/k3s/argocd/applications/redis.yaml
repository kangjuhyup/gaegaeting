apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: redis
    targetRevision: 18.4.0
    helm:
      values: |
        global:
          storageClass: "local-path"

        architecture: standalone

        image:
          registry: docker.io
          repository: redis
          tag: "7"
          pullPolicy: IfNotPresent

        auth:
          enabled: false

        master:
          persistence:
            enabled: true
            storageClass: "local-path"
            size: 4Gi
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 250m
          containerSecurityContext:
            enabled: true
            runAsUser: 999
            runAsNonRoot: true

        metrics:
          enabled: false

        volumePermissions:
          enabled: false

        sysctl:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: database
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
