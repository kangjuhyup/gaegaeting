## ELK Stack (Elasticsearch, Logstash, Kibana) Configuration
## Elastic Helm Charts

---
## Elasticsearch Configuration
elasticsearch:
  enabled: true

  ## Cluster settings
  clusterName: "gaegaeting-es"
  nodeGroup: "master"

  ## Replica count (3 for production, 1 for dev)
  replicas: 1
  minimumMasterNodes: 1

  ## Resources
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

  ## Persistence
  persistence:
    enabled: true
    storageClassName: "local-path"
    size: 30Gi

  ## JVM heap size
  esJavaOpts: "-Xmx1g -Xms1g"

  ## Elasticsearch configuration
  esConfig:
    elasticsearch.yml: |
      cluster.name: gaegaeting-es
      network.host: 0.0.0.0
      xpack.security.enabled: false
      xpack.monitoring.enabled: true
      xpack.graph.enabled: true
      xpack.watcher.enabled: true

  ## Service
  service:
    type: ClusterIP
    httpPort: 9200
    transportPort: 9300

  ## Anti-affinity (spread pods across nodes)
  antiAffinity: "soft"

---
## Logstash Configuration
logstash:
  enabled: true
  replicas: 1

  ## Resources
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

  ## Persistence
  persistence:
    enabled: true
    storageClassName: "local-path"
    size: 5Gi

  ## Logstash configuration
  logstashConfig:
    logstash.yml: |
      http.host: 0.0.0.0
      xpack.monitoring.enabled: true
      xpack.monitoring.elasticsearch.hosts: ["http://elasticsearch:9200"]

  ## Pipeline configuration
  logstashPipeline:
    logstash.conf: |
      input {
        beats {
          port => 5044
        }
        tcp {
          port => 5000
          codec => json
        }
        http {
          port => 8080
          codec => json
        }
      }

      filter {
        # Parse JSON logs
        if [message] =~ /^\{.*\}$/ {
          json {
            source => "message"
          }
        }

        # Add timestamp
        date {
          match => ["timestamp", "ISO8601"]
          target => "@timestamp"
        }

        # Grok patterns for common log formats
        grok {
          match => { "message" => "%{COMBINEDAPACHELOG}" }
        }

        # Remove unnecessary fields
        mutate {
          remove_field => ["agent", "ecs", "input", "host"]
        }
      }

      output {
        elasticsearch {
          hosts => ["http://elasticsearch:9200"]
          index => "gaegaeting-%{+YYYY.MM.dd}"
          manage_template => true
        }

        # Debug output (optional)
        # stdout { codec => rubydebug }
      }

  ## Service
  service:
    type: ClusterIP
    ports:
      - name: beats
        port: 5044
        protocol: TCP
      - name: tcp
        port: 5000
        protocol: TCP
      - name: http
        port: 8080
        protocol: TCP

---
## Kibana Configuration
kibana:
  enabled: true
  replicas: 1

  ## Resources
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

  ## Elasticsearch hosts
  elasticsearchHosts: "http://elasticsearch:9200"

  ## Kibana configuration
  kibanaConfig:
    kibana.yml: |
      server.host: "0.0.0.0"
      server.name: "gaegaeting-kibana"
      elasticsearch.hosts: ["http://elasticsearch:9200"]
      xpack.monitoring.enabled: true
      xpack.graph.enabled: true
      xpack.reporting.enabled: true

  ## Service
  service:
    type: ClusterIP
    port: 5601

  ## Ingress (optional)
  ingress:
    enabled: false
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: kibana.gaegaeting.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: kibana-tls
        hosts:
          - kibana.gaegaeting.com

---
## Filebeat Configuration (optional - for log collection)
filebeat:
  enabled: false
  daemonset:
    enabled: true

  ## Resources
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

  ## Filebeat configuration
  filebeatConfig:
    filebeat.yml: |
      filebeat.inputs:
      - type: container
        paths:
          - /var/log/containers/*.log
        processors:
        - add_kubernetes_metadata:
            host: ${NODE_NAME}
            matchers:
            - logs_path:
                logs_path: "/var/log/containers/"

      output.logstash:
        hosts: ["logstash:5044"]

      logging.level: info

---
## Metricbeat Configuration (optional - for metrics collection)
metricbeat:
  enabled: false
  daemonset:
    enabled: true

  ## Resources
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

  ## Metricbeat configuration
  metricbeatConfig:
    metricbeat.yml: |
      metricbeat.modules:
      - module: system
        metricsets:
          - cpu
          - load
          - memory
          - network
          - process
          - process_summary
        period: 10s
        processes: ['.*']

      - module: kubernetes
        metricsets:
          - node
          - system
          - pod
          - container
          - volume
        period: 10s
        host: ${NODE_NAME}
        hosts: ["https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}"]

      output.elasticsearch:
        hosts: ["http://elasticsearch:9200"]
        index: "metricbeat-%{+yyyy.MM.dd}"
