## ArgoCD Configuration
## Argo CD Helm Chart

## Global settings
global:
  image:
    tag: "v2.9.3"

## Controller
controller:
  replicas: 1

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring

## Server
server:
  replicas: 2

  ## Run in insecure mode (Traefik handles TLS)
  extraArgs:
    - --insecure

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  ## ArgoCD Server configuration
  config:
    url: https://argocd.gaegaeting.com
    application.instanceLabelKey: argocd.argoproj.io/instance

    # Enable anonymous access (disable in production)
    users.anonymous.enabled: "false"

    # Git repositories
    repositories: |
      - type: git
        url: https://github.com/kangjuhyup/gaegaeting

    # Resource customizations
    resource.customizations: |
      networking.k8s.io/Ingress:
        health.lua: |
          hs = {}
          hs.status = "Healthy"
          return hs

  ## RBAC configuration
  rbacConfig:
    policy.default: role:readonly
    policy.csv: |
      p, role:admin, applications, *, */*, allow
      p, role:admin, clusters, *, *, allow
      p, role:admin, repositories, *, *, allow
      p, role:admin, projects, *, *, allow
      p, role:admin, accounts, *, *, allow
      p, role:admin, certificates, *, *, allow
      p, role:admin, gpgkeys, *, *, allow

      g, admin, role:admin

  ## Service
  service:
    type: ClusterIP
    servicePortHttp: 80
    servicePortHttps: 443

  ## Ingress
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - argo.gaegaeting.app
    paths:
      - /
    pathType: Prefix
    tls:
      - secretName: argocd-server-tls
        hosts:
          - argo.gaegaeting.app

  ## Metrics
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring

## Repo Server
repoServer:
  replicas: 2

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

  ## Metrics
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring

## Application Set Controller
applicationSet:
  enabled: true
  replicas: 1

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

## Notifications Controller
notifications:
  enabled: true

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

  ## Notification services (Slack, Email, etc.)
  notifiers:
    service.slack: |
      token: $slack-token

  ## Notification templates
  templates:
    template.app-deployed: |
      message: |
        Application {{.app.metadata.name}} is now running new version.
      slack:
        attachments: |
          [{
            "title": "{{ .app.metadata.name}}",
            "title_link":"{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
            "color": "#18be52",
            "fields": [
            {
              "title": "Sync Status",
              "value": "{{.app.status.sync.status}}",
              "short": true
            },
            {
              "title": "Repository",
              "value": "{{.app.spec.source.repoURL}}",
              "short": true
            }
            ]
          }]

  ## Triggers
  triggers:
    trigger.on-deployed: |
      - when: app.status.operationState.phase in ['Succeeded']
        send: [app-deployed]

## Redis (for caching)
redis:
  enabled: true

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring

## Redis HA (High Availability)
redis-ha:
  enabled: false

## Dex (SSO - optional)
dex:
  enabled: false

## Configs
configs:
  ## Secret for initial admin password
  secret:
    createSecret: true
    argocdServerAdminPassword: ""  # Set via Doppler (bcrypt hash)
    argocdServerAdminPasswordMtime: "2024-01-01T00:00:00Z"

  ## Repository credentials
  credentialTemplates:
    github-creds:
      url: https://github.com/kangjuhyup
      username: not-used
      password: ""  # GitHub token, set via Doppler

  ## ConfigMap for repository credentials
  repositories:
    gaegaeting-repo:
      url: https://github.com/kangjuhyup/gaegaeting
      type: git
      name: gaegaeting

## Create cluster roles
createClusterRoles: true

## Service Account
serviceAccount:
  create: true
  automountServiceAccountToken: true

