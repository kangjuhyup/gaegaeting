## Kafka + Schema Registry (Avro) Configuration
## Bitnami Kafka Helm Chart

## Global settings
global:
  storageClass: "local-path"

## Kafka configuration
kafka:
  ## Replica count
  replicaCount: 3

  ## Kafka listeners
  listeners:
    client:
      protocol: PLAINTEXT
    controller:
      protocol: PLAINTEXT
    interbroker:
      protocol: PLAINTEXT
    external:
      protocol: PLAINTEXT

  ## Persistence
  persistence:
    enabled: true
    storageClass: "local-path"
    size: 20Gi

  ## Resources
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 2Gi
      cpu: 1000m

  ## Kafka configuration
  config: |
    auto.create.topics.enable=true
    default.replication.factor=2
    min.insync.replicas=1
    num.partitions=3
    offsets.topic.replication.factor=2
    transaction.state.log.replication.factor=2
    transaction.state.log.min.isr=1
    log.retention.hours=168
    log.segment.bytes=1073741824
    log.retention.check.interval.ms=300000
    compression.type=producer
    message.max.bytes=10485760

  ## Metrics
  metrics:
    kafka:
      enabled: true
    jmx:
      enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring

## Zookeeper configuration (required for Kafka)
zookeeper:
  enabled: true
  replicaCount: 3

  persistence:
    enabled: true
    storageClass: "local-path"
    size: 8Gi

  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m

## Kraft mode (alternative to Zookeeper - optional, requires Kafka 3.0+)
kraft:
  enabled: false

## External access (optional)
externalAccess:
  enabled: false

## Service configuration
service:
  type: ClusterIP
  ports:
    client: 9092

---
## Schema Registry Configuration (separate deployment)
## Confluent Schema Registry

schemaRegistry:
  enabled: true
  replicaCount: 2

  image:
    repository: confluentinc/cp-schema-registry
    tag: 7.5.0

  ## Kafka bootstrap servers
  kafkaBootstrapServers: "kafka:9092"

  ## Schema Registry configuration
  config:
    schema.compatibility.level: BACKWARD
    kafkastore.topic: _schemas
    kafkastore.topic.replication.factor: 2
    debug: false

  ## Resources
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 500m

  ## Service
  service:
    type: ClusterIP
    port: 8081

  ## Metrics
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring

  ## Environment variables
  env:
    - name: SCHEMA_REGISTRY_HOST_NAME
      value: schema-registry
    - name: SCHEMA_REGISTRY_LISTENERS
      value: "http://0.0.0.0:8081"
    - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
      value: "kafka:9092"
    - name: SCHEMA_REGISTRY_KAFKASTORE_TOPIC
      value: "_schemas"
    - name: SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL
      value: "BACKWARD"

## Kafka Connect (optional - for connectors)
kafkaConnect:
  enabled: false
  replicaCount: 2

## REST Proxy (optional)
restProxy:
  enabled: false

## KSQL (optional)
ksql:
  enabled: false
