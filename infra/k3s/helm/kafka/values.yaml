## Kafka Configuration (Bitnami Kafka Helm Chart v26.4.3)
## Using KRaft mode (Zookeeper-less) - Minimal setup

## Global settings
global:
  storageClass: "local-path"

## Image configuration
image:
  registry: docker.io
  repository: bitnami/kafka
  tag: "3.7"
  pullPolicy: IfNotPresent

## Combined mode (broker + controller in single pod for dev)
replicaCount: 1

## Persistence
persistence:
  enabled: true
  storageClass: "local-path"
  size: 10Gi

## Resources (minimal for dev)
resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 1Gi
    cpu: 500m

## Kafka configuration
kraft:
  enabled: true

listeners:
  client:
    protocol: PLAINTEXT
  controller:
    protocol: PLAINTEXT
  interbroker:
    protocol: PLAINTEXT

## Kafka server properties (single replica settings)
extraConfig: |
  auto.create.topics.enable=true
  default.replication.factor=1
  min.insync.replicas=1
  num.partitions=3
  offsets.topic.replication.factor=1
  transaction.state.log.replication.factor=1
  transaction.state.log.min.isr=1
  log.retention.hours=168
  compression.type=producer
  message.max.bytes=10485760

## Metrics (disabled)
metrics:
  kafka:
    enabled: false
  jmx:
    enabled: false

## Zookeeper (disabled in KRaft mode)
zookeeper:
  enabled: false

## Service configuration
service:
  type: ClusterIP
  ports:
    client: 9092

## Headless service
headlessService:
  ports:
    client: 9092
