## Redis Configuration (Master-Replica with Sentinel)
## Bitnami Redis Helm Chart

## Global settings
global:
  storageClass: "local-path"
  redis:
    password: ""  # Set via Doppler

## Redis Architecture
architecture: replication

## Authentication
auth:
  enabled: true
  password: ""  # Set via Doppler
  sentinel: true

## Master configuration
master:
  count: 1

  persistence:
    enabled: true
    storageClass: "local-path"
    size: 8Gi

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 250m

  ## Redis configuration
  configuration: |-
    # Redis performance tuning
    maxmemory 256mb
    maxmemory-policy allkeys-lru

    # Persistence
    save 900 1
    save 300 10
    save 60 10000

    # AOF persistence
    appendonly yes
    appendfsync everysec

    # Networking
    tcp-backlog 511
    timeout 0
    tcp-keepalive 300

    # Limits
    maxclients 10000

  ## Service
  service:
    type: ClusterIP
    ports:
      redis: 6379

## Replica configuration
replica:
  replicaCount: 2

  persistence:
    enabled: true
    storageClass: "local-path"
    size: 8Gi

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 250m

  ## Service
  service:
    type: ClusterIP
    ports:
      redis: 6379

  ## Auto failover
  autoscaling:
    enabled: false

## Sentinel configuration (for automatic failover)
sentinel:
  enabled: true
  quorum: 2
  downAfterMilliseconds: 5000
  failoverTimeout: 10000
  parallelSyncs: 1

  ## Resources
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

  ## Service
  service:
    type: ClusterIP
    ports:
      sentinel: 26379

## Metrics
metrics:
  enabled: true

  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

  serviceMonitor:
    enabled: true
    namespace: monitoring

## Common configuration
commonConfiguration: |-
  # Enable Redis commands
  rename-command FLUSHDB ""
  rename-command FLUSHALL ""
  rename-command CONFIG ""

## TLS configuration (optional)
tls:
  enabled: false

## Network Policy (optional)
networkPolicy:
  enabled: false

## Pod Security Policy
podSecurityPolicy:
  create: false

## Service Account
serviceAccount:
  create: true
  automountServiceAccountToken: false

## Volume Permissions
volumePermissions:
  enabled: true
  image:
    pullPolicy: IfNotPresent

## Sysctl Image (for kernel parameter tuning)
sysctl:
  enabled: true
  image:
    pullPolicy: IfNotPresent
  command:
    - /bin/sh
    - -c
    - |-
      sysctl -w net.core.somaxconn=10000
      sysctl -w vm.overcommit_memory=1
      sysctl -w fs.file-max=100000

## Pod Disruption Budget
pdb:
  create: true
  minAvailable: 1

## Priority Class
priorityClassName: ""
