## Redis Configuration (Standalone)
## Bitnami Redis Helm Chart

## Global settings
global:
  storageClass: "local-path"

## Redis Architecture (standalone for dev)
architecture: standalone

## Image configuration
image:
  registry: docker.io
  repository: redis
  tag: 7-alpine
  pullPolicy: IfNotPresent

## Authentication
auth:
  enabled: false

## Master configuration
master:
  persistence:
    enabled: true
    storageClass: "local-path"
    size: 4Gi

  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m

  ## Override healthcheck commands for Alpine (use sh instead of bash)
  containerSecurityContext:
    enabled: true
    runAsUser: 1001
    runAsNonRoot: true

  livenessProbe:
    enabled: true
    initialDelaySeconds: 20
    periodSeconds: 5
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 5
    exec:
      command:
        - sh
        - -c
        - redis-cli ping | grep -q PONG

  readinessProbe:
    enabled: true
    initialDelaySeconds: 20
    periodSeconds: 5
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 5
    exec:
      command:
        - sh
        - -c
        - redis-cli ping | grep -q PONG

  ## Redis configuration
  configuration: |-
    # Redis performance tuning
    maxmemory 256mb
    maxmemory-policy allkeys-lru

    # Persistence
    save 900 1
    save 300 10
    save 60 10000

    # AOF persistence
    appendonly yes
    appendfsync everysec

    # Networking
    tcp-backlog 511
    timeout 0
    tcp-keepalive 300

    # Limits
    maxclients 10000

  ## Service
  service:
    type: ClusterIP
    ports:
      redis: 6379

## Metrics (disabled for simplicity)
metrics:
  enabled: false

## Common configuration
commonConfiguration: |-
  # Disable dangerous commands
  rename-command FLUSHDB ""
  rename-command FLUSHALL ""

## Volume Permissions
volumePermissions:
  enabled: false

## Sysctl (disabled for compatibility)
sysctl:
  enabled: false
