---
- name: reload systemd
  systemd:
    daemon_reload: true

- name: restart k3s
  systemd:
    name: k3s
    state: restarted
  when: k3s_node_role | default('server') == 'server'

- name: restart k3s agent
  systemd:
    name: k3s-agent
    state: restarted
  when: k3s_node_role | default('server') == 'agent'