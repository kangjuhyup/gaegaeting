---
# Helm role default variables

## Helm version
helm_version: "v3.13.3"
helm_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

## Helm charts to deploy
helm_charts:
  - name: argocd
    enabled: true
    namespace: argocd
    create_namespace: true
    chart_ref: argo/argo-cd
    chart_version: "5.51.6"
    values_file: "{{ playbook_dir }}/../../helm/argocd/values.yaml"

  - name: external-secrets
    enabled: true
    namespace: external-secrets
    create_namespace: true
    chart_ref: external-secrets/external-secrets
    chart_version: "0.9.11"
    values_file: "{{ playbook_dir }}/../../helm/external-secrets/values.yaml"

## Helm repositories
helm_repos:
  - name: argo
    url: https://argoproj.github.io/argo-helm
  - name: external-secrets
    url: https://charts.external-secrets.io

## Wait for deployments
helm_wait: true
helm_timeout: 600s
