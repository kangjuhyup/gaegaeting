---
# Helm role default variables

## Helm version
helm_version: "v3.13.3"
helm_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

## Helm charts to deploy
helm_charts:
  - name: istio-base
    enabled: true
    namespace: istio-system
    create_namespace: true
    chart_ref: istio/base
    chart_version: "1.22.6"
    values_file: "{{ playbook_dir }}/../../helm/istio-base/values.yaml"

  - name: istiod
    enabled: true
    namespace: istio-system
    create_namespace: true
    chart_ref: istio/istiod
    chart_version: "1.22.6"
    values_file: "{{ playbook_dir }}/../../helm/istiod/values.yaml"

  - name: istio-ingressgateway
    enabled: true
    namespace: istio-system
    create_namespace: true
    chart_ref: istio/gateway
    chart_version: "1.22.6"
    values_file: "{{ playbook_dir }}/../../helm/istio-ingressgateway/values.yaml"

  - name: cert-manager
    enabled: true
    namespace: cert-manager
    create_namespace: true
    chart_ref: jetstack/cert-manager
    chart_version: "v1.14.7"
    values_file: "{{ playbook_dir }}/../../helm/cert-manager/values.yaml"

  - name: argocd
    enabled: true
    namespace: argocd
    create_namespace: true
    chart_ref: argo/argo-cd
    chart_version: "5.51.6"
    values_file: "{{ playbook_dir }}/../../helm/argocd/values.yaml"

  - name: external-secrets
    enabled: true
    namespace: external-secrets
    create_namespace: true
    chart_ref: external-secrets/external-secrets
    chart_version: "0.9.11"
    values_file: "{{ playbook_dir }}/../../helm/external-secrets/values.yaml"

## Helm repositories
helm_repos:
  - name: istio
    url: https://istio-release.storage.googleapis.com/charts
  - name: argo
    url: https://argoproj.github.io/argo-helm
  - name: external-secrets
    url: https://charts.external-secrets.io
  - name: jetstack
    url: https://charts.jetstack.io

## Wait for deployments
helm_wait: true
helm_timeout: 600s
