---
- name: Deploy k3s single node cluster
  hosts: k3s_cluster
  become: true
  gather_facts: true
  
  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"
      
    - name: Update yum cache
      yum:
        update_cache: true
      when: ansible_os_family == "RedHat"

  roles:
    - role: system
      tags: [system, preparation]
    - role: k3s
      tags: [k3s, kubernetes]
    - role: monitoring
      tags: [monitoring]
      when: monitoring.enabled | default(false)
    - role: backup
      tags: [backup]
      when: backup.enabled | default(false)

  post_tasks:
    - name: Display cluster information
      debug:
        msg: |
          🎉 k3s cluster deployment completed!

          Cluster Info:
          - k3s version: {{ k3s_version | default('v1.28.5+k3s1') }}
          - API server: https://{{ ansible_default_ipv4.address }}:6443
          - kubeconfig: /etc/rancher/k3s/k3s.yaml

          Quick commands:
          - kubectl get nodes
          - kubectl get pods -A
          - kubectl cluster-info
      run_once: true
      tags: [always]