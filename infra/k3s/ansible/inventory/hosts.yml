---
all:
  children:
    k3s_cluster:
      children:
        k3s_server:
          hosts:
            k3s-master:
              ansible_host: "{{ ansible_host | default('192.168.1.100') }}"
              ansible_user: "{{ ansible_user | default('ubuntu') }}"
              ansible_ssh_private_key_file: ~/.ssh/id_rsa
              k3s_node_role: server
              k3s_server_init: true
        k3s_agent:
          hosts:
            # 필요시 agent 노드 추가
            # k3s-worker-1:
            #   ansible_host: 192.168.1.101
            #   ansible_user: ubuntu
            #   k3s_node_role: agent

  vars:
    # 공통 변수
    ansible_python_interpreter: /usr/bin/python3
    
    # k3s 설정
    k3s_version: v1.28.5+k3s1
    k3s_token: "{{ vault_k3s_token | default('my-secret-token-' + ansible_date_time.epoch) }}"
    k3s_datastore_endpoint: ""
    
    # 네트워크 설정
    k3s_cluster_cidr: "10.42.0.0/16"
    k3s_service_cidr: "10.43.0.0/16"
    k3s_cluster_dns: "10.43.0.10"
    k3s_cluster_domain: "cluster.local"
    
    # 추가 설정
    k3s_disable_components:
      - traefik  # nginx-ingress 사용 시
      # - servicelb  # metallb 사용 시
    
    k3s_extra_server_args:
      - "--write-kubeconfig-mode=644"
      - "--cluster-init"
      - "--disable-cloud-controller"
      
    k3s_extra_agent_args: []