<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>개개팅 API 문서</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <style>
    body { 
      font-family: 'Noto Sans KR', sans-serif;
      padding: 50px 0;
      background-color: #f8f9fa;
    }
    .container {
      max-width: 800px;
    }
    .card {
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
      transition: transform 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .card-header {
      background-color: #4990e2;
      color: white;
      font-weight: bold;
      border-radius: 10px 10px 0 0 !important;
    }
    .btn-primary {
      background-color: #4990e2;
      border-color: #4990e2;
    }
    h1 {
      margin-bottom: 30px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="text-center mb-5">
      <h1>개개팅 API 문서</h1>
      <p class="lead">강아지 산책 소개팅 애플리케이션 API 문서입니다.</p>
    </div>
    
    <div class="row">
      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-header">계정 API</div>
          <div class="card-body">
            <h5 class="card-title">사용자 계정 관련 API</h5>
            <p class="card-text">사용자 프로필, 인증, 반려동물 정보 등 계정 관련 API를 제공합니다.</p>
            <a href="./account/" class="btn btn-primary">문서 보기</a>
          </div>
        </div>
      </div>
      
      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-header">매칭 API</div>
          <div class="card-body">
            <h5 class="card-title">매칭 관련 API</h5>
            <p class="card-text">피드, 좋아요, 매칭, 채팅 등 매칭 관련 API를 제공합니다.</p>
            <a href="./match/" class="btn btn-primary">문서 보기</a>
          </div>
        </div>
      </div>
    </div>
    
    <footer class="mt-5 text-center text-muted">
      <p>© 2025 개개팅. All rights reserved.</p>
    </footer>
  </div>
</body>
</html>
