scalar DateTime

# Federation 지원을 위한 스키마 확장
extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.0", import: ["@key", "@shareable"])

type Pet @key(fields: "id") {
  id: Int!
  name: String!
  age: Int!
  gender: PetGender!
  breed: PetBreed!
  size: PetSize!
  personalities: [PetPersonality!]!
  description: String
  userId: ID!
  isCertificated: Boolean!
  profileImages: [String!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

enum PetGender {
  MALE
  FEMALE
}

enum PetSize {
  SMALL
  MEDIUM
  LARGE
}

enum PetBreed {
  MALTESE
  POODLE
  CHIHUAHUA
  POMERANIAN
  SHIH_TZU
  YORKSHIRE
  BEAGLE
  GOLDEN_RETRIEVER
  LABRADOR
  HUSKY
  SAMOYED
  WELSH_CORGI
  JINDO
  MIXED
  OTHER
}

enum PetPersonality {
  FRIENDLY
  SHY
  ACTIVE
  CALM
  PLAYFUL
  PROTECTIVE
  CURIOUS
  INDEPENDENT
}

type PresignedUrl {
  url: String!
  expiresIn: Int!
}

input CreatePetInput {
  name: String!
  age: Int!
  gender: PetGender!
  breed: PetBreed!
  size: PetSize!
  personalities: [PetPersonality!]!
  description: String
}

input UpdatePetInput {
  name: String
  age: Int
  personalities: [PetPersonality!]
  description: String
}

input CertifyPetInput {
  userName: String!
  certificationCode: String!
}

extend type Query {
  pets: [Pet!]! # 내 반려동물 목록 조회
  pet(id: Int!): Pet # 특정 반려동물 조회
  petsByUserId(userId: ID!): [Pet!]! # 특정 사용자의 반려동물 목록 조회
}

extend type Mutation {
  createPet(input: CreatePetInput!): Pet! # 반려동물 추가
  updatePet(id: Int!, input: UpdatePetInput!): Pet! # 반려동물 정보 갱신
  certifyPet(id: Int!, input: CertifyPetInput!): Pet! # 반려동물 등록번호 인증
  deletePet(id: Int!): Boolean! # 반려동물 삭제
  generatePetPresignedUrl(petId: Int!, imageNo: Int!): PresignedUrl! # 반려동물 이미지 PresignedUrl 생성
  deletePetImage(petId: Int!, imageNo: Int!): Boolean! # 반려동물 이미지 삭제
}

