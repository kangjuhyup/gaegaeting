name: Docker Release

on:
  push:
    branches: [ release ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }} # owner/repo
  SSH_HOST: ${{ secrets.DEPLOY_HOST }}
  SSH_USER: ${{ secrets.DEPLOY_USER }}
  SSH_KEY:  ${{ secrets.DEPLOY_SSH_KEY }}
  DOCKER_COMPOSE_REMOTE_PATH: ${{ vars.DOCKER_COMPOSE_REMOTE_PATH }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: account
            context: .
            dockerfile: packages/account/Dockerfile
            image: account
          - name: match
            context: .
            dockerfile: packages/match/Dockerfile
            image: match
          - name: match-batch
            context: .
            dockerfile: packages/match/Dockerfile.batch
            image: match-batch

    steps:
      - uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # # monorepo라면 루트에서 의존성 캐시
      # - name: Yarn install (for copy/build steps inside Docker if needed)
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: 20
      #     cache: 'yarn'
      # - run: yarn install --immutable

      # - name: Build & Push ${{ matrix.name }}
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: ${{ matrix.context }}
      #     file: ${{ matrix.dockerfile }}
      #     push: true
      #     platforms: linux/amd64,linux/arm64
      #     tags: |
      #       ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:latest
      #       ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ github.sha }}
      #     labels: |
      #       org.opencontainers.image.source=${{ github.repository }}
      #       org.opencontainers.image.revision=${{ github.sha }}
      #     # ⚠️ build-time 시크릿이 필요하다면 아래 secrets 블록과 Dockerfile의 --mount=type=secret 사용
      #     # secrets: |
      #     #   id=doppler,env=DOPPLER_TOKEN

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      - name: Write SSH key
        run: |
          echo "${SSH_KEY}" > key.pem
          chmod 600 key.pem

      - name: Remote deploy with Doppler
        env:
          REGISTRY: ${{ env.REGISTRY }}
          NS: ${{ env.IMAGE_NAMESPACE }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: ${{ vars.DOPPLER_PROJECT }}
          DOCKER_COMPOSE_REMOTE_PATH: ${{ vars.DOCKER_COMPOSE_REMOTE_PATH }}
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${SSH_USER}@${SSH_HOST} << EOF
            set -euo pipefail

            # --- 1) Docker 로그인 (GHCR)
            echo "${GITHUB_TOKEN}" | docker login ${REGISTRY} -u "${GITHUB_ACTOR}" --password-stdin

            # --- 2) Doppler CLI 설치 (없을 경우)
            if ! command -v doppler >/dev/null 2>&1; then
              curl -Ls https://cli.doppler.com/install.sh | sudo sh
            fi
            export DOPPLER_TOKEN="${DOPPLER_TOKEN}"

            # --- 3) env 파일 생성 위치
            echo "[DEBUG] APP_DIR=${DOCKER_COMPOSE_REMOTE_PATH}"
            mkdir -p "${DOCKER_COMPOSE_REMOTE_PATH}/env"

            # account
            if [ -n "${DOPPLER_PROJECT:-}" ]; then
              doppler secrets download --project "${DOPPLER_PROJECT}" --config prd --format docker --no-file > "${DOCKER_COMPOSE_REMOTE_PATH}/env/account.env"
            else
              doppler secrets download --project app --config account-prd --format docker --no-file > "${DOCKER_COMPOSE_REMOTE_PATH}/env/account.env"
            fi

            # match
            if [ -n "${DOPPLER_PROJECT:-}" ]; then
              doppler secrets download --project "${DOPPLER_PROJECT}" --config prd --format docker --no-file > "${DOCKER_COMPOSE_REMOTE_PATH}/env/match.env"
            else
              doppler secrets download --project app --config match-prd --format docker --no-file > "${DOCKER_COMPOSE_REMOTE_PATH}/env/match.env"
            fi

            # match-batch
            if [ -n "${DOPPLER_PROJECT:-}" ]; then
              doppler secrets download --project "${DOPPLER_PROJECT}" --config prd --format docker --no-file > "${DOCKER_COMPOSE_REMOTE_PATH}/env/match-batch.env"
            else
              doppler secrets download --project app --config match-batch-prd --format docker --no-file > "${DOCKER_COMPOSE_REMOTE_PATH}/env/match-batch.env"
            fi

            # --- 4) 최신 이미지 pull & 재기동
            docker compose -f "${DOCKER_COMPOSE_REMOTE_PATH}/docker-compose.yml" pull
            docker compose -f "${DOCKER_COMPOSE_REMOTE_PATH}//docker-compose.yml" up -d

            # (선택) 오래된 dangling 이미지/레이어 정리
            docker image prune -f || true
          EOF
