name: Docker Release

on:
  pull_request:
    branches:
      - develop
      - release

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }} # owner/repo
  SSH_HOST: ${{ secrets.DEPLOY_HOST }}
  SSH_USER: ${{ secrets.DEPLOY_USER }}
  SSH_KEY:  ${{ secrets.DEPLOY_SSH_KEY }}
  DOCKER_COMPOSE_REMOTE_PATH: ${{ vars.DOCKER_COMPOSE_REMOTE_PATH }}

jobs:
  check-branch:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      context: ${{ steps.check.outputs.context }}
      subtype: ${{ steps.check.outputs.subtype }}
      dockerfile: ${{ steps.check.outputs.dockerfile }}
      image_name: ${{ steps.check.outputs.image_name }}
    steps:
      - name: Check branch pattern
        id: check
        run: |
          SOURCE_BRANCH="${{ github.head_ref }}"

          # 첫 번째 세그먼트 추출 (account, match, chat 등)
          CONTEXT=$(echo "$SOURCE_BRANCH" | cut -d'/' -f1)

          # 허용된 브랜치 패턴 체크
          ALLOWED_CONTEXTS=("account" "match" "chat" "payments" "auth" "gateway")
          if [[ " ${ALLOWED_CONTEXTS[@]} " =~ " ${CONTEXT} " ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT

            # 두 번째 세그먼트 추출 (api, batch 등)
            SUBTYPE=$(echo "$SOURCE_BRANCH" | cut -d'/' -f2 -s)

            # Dockerfile 경로 구성
            if [ -n "$SUBTYPE" ] && [ "$SUBTYPE" != "${SOURCE_BRANCH#*/}" ]; then
              DOCKERFILE="packages/${CONTEXT}/Dockerfile.${SUBTYPE}"
              IMAGE_NAME="${CONTEXT}-${SUBTYPE}"
            else
              DOCKERFILE="packages/${CONTEXT}/Dockerfile"
              IMAGE_NAME="${CONTEXT}"
            fi

            echo "context=$CONTEXT" >> $GITHUB_OUTPUT
            echo "subtype=$SUBTYPE" >> $GITHUB_OUTPUT
            echo "dockerfile=$DOCKERFILE" >> $GITHUB_OUTPUT
            echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT

            echo "Will build: $DOCKERFILE -> $IMAGE_NAME"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "Skipping - branch pattern not in allowed list: $SOURCE_BRANCH"
          fi

  build-and-push:
    needs: check-branch
    if: needs.check-branch.outputs.should_build == 'true'
    runs-on: ubuntu-24.04-arm64
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set build variables
        id: branch-info
        run: |
          echo "dockerfile=${{ needs.check-branch.outputs.dockerfile }}" >> $GITHUB_OUTPUT
          echo "image_name=${{ needs.check-branch.outputs.image_name }}" >> $GITHUB_OUTPUT
          echo "source_branch=${{ github.head_ref }}" >> $GITHUB_OUTPUT

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # # monorepo라면 루트에서 의존성 캐시
      - name: Yarn install (for copy/build steps inside Docker if needed)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
      - run: yarn install --immutable

      - name: Build & Push ${{ steps.branch-info.outputs.service_name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.branch-info.outputs.dockerfile }}
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ steps.branch-info.outputs.image_name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ steps.branch-info.outputs.image_name }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.branch=${{ steps.branch-info.outputs.source_branch }}
          # ⚠️ build-time 시크릿이 필요하다면 아래 secrets 블록과 Dockerfile의 --mount=type=secret 사용
          # secrets: |
          #   id=doppler,env=DOPPLER_TOKEN
